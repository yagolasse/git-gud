<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git Gud</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <!-- Top Menu Bar -->
    <div class="menu-bar">
      <div class="menu-item">
        File
        <div class="dropdown-content">
          <div class="dropdown-item" id="menu-open">Open Repository...</div>
        </div>
      </div>
    </div>

    <!-- Repository Tabs -->
    <div class="tabs-container" id="tabs-container">
      <!-- Tabs will be injected here -->
    </div>

    <!-- Main Content Area -->
    <main class="content-area">
      <div id="no-repo-view">
        <div style="text-align: center; margin-top: 100px; color: #666;">
          <h2>No repository open</h2>
          <p>Go to File > Open Repository... to get started.</p>
        </div>
      </div>
<div id="repo-view" class="hidden">
  <div class="repo-header">
    <div class="repo-info-card">
      <h2>Repository Details</h2>
      <p><strong>Name:</strong> <span id="display-name"></span></p>
      <p><strong>Path:</strong> <span id="display-path"></span></p>
      <p><strong>Current Branch:</strong> <span id="display-branch"></span></p>
    </div>
  </div>

  <div class="changes-section">
    <h3>Changes</h3>
    <ul id="changes-list">
      <!-- Changes will be injected here -->
    </ul>
  </div>
</div>

    </main>
  </body>
</html>
